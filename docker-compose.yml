services:
  app:
    image: elshirbini/e-commerce:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - /var/logs/e-commerce:/usr/src/app/logs
    deploy:
      endpoint_mode: vip
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    networks:
      - e-commerce-app-network
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - e-commerce-app-network
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - e-commerce-app-network

networks:
  e-commerce-app-network:
    driver: overlay

volumes:
  mongo_data:
  redis_data:
