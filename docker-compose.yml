services:
  app:
    image: elshirbini/e-commerce:latest
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DB_URL=${DB_URL}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_DB=${MONGO_DB}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL_PROD=${GOOGLE_CALLBACK_URL_PROD}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - GOOGLE_failed_CALLBACK_URL=${GOOGLE_failed_CALLBACK_URL}
      - GOOGLE_failed_CALLBACK_URL_PROD=${GOOGLE_failed_CALLBACK_URL_PROD}
      - FRONTEND_URL_PROD=${FRONTEND_URL_PROD}
      - FRONTEND_URL=${FRONTEND_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASS}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
    ports:
      - "8080:8080"
    volumes:
      - /var/logs/e-commerce:/usr/src/app/logs
    deploy:
      endpoint_mode: vip
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    networks:
      - e-commerce-app-network
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - e-commerce-app-network
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - e-commerce-app-network

networks:
  e-commerce-app-network:
    driver: overlay

volumes:
  mongo_data:
  redis_data:
